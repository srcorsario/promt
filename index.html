<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt & GitHub Context Sync</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --text: #f8fafc;
            --green: #10b981;
            --danger: #ef4444;
        }
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 96%;
            margin: 0 auto;
        }
        .header-area {
            text-align: center;
            margin-bottom: 25px;
            position: relative;
        }
        h1 { color: var(--accent); font-size: 2.2rem; margin-bottom: 5px; }
        p.subtitle { color: #94a3b8; margin-top: 0; margin-bottom: 10px; }
        
        .version-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
        }
        .version-badge {
            display: inline-block;
            background: #334155;
            color: var(--accent);
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
        }
        
        .box {
            background: var(--card);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .url-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        @media (max-width: 768px) {
            .url-grid { grid-template-columns: 1fr; gap: 0; }
        }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: #cbd5e1; font-size: 0.9rem; }
        input[type="text"], textarea, select {
            width: 100%;
            padding: 12px;
            box-sizing: border-box;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: white;
            font-family: inherit;
            margin-bottom: 15px;
        }
        select { cursor: pointer; }
        textarea { 
            height: 180px; /* Altura optimizada para dar espacio a la cabecera sin perder comodidad */
            resize: vertical; 
            font-size: 1.05rem;
            line-height: 1.5;
        }
        
        .btn-group {
            display: flex;
            gap: 15px;
        }
        button {
            background: var(--accent);
            color: #0f172a;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }
        button:hover { background: #7dd3fc; }
        button:active { transform: scale(0.98); }
        button:disabled { background: #475569; color: #94a3b8; cursor: not-allowed; transform: none; }
        
        #btnReset {
            background: #334155;
            color: white;
        }
        #btnReset:hover {
            background: #475569;
        }

        .status {
            text-align: center;
            font-weight: 600;
            margin: 15px 0 0;
            color: var(--green);
            display: none;
            font-size: 1.05rem;
        }
        .file-tag {
            display: inline-block;
            background: #334155;
            padding: 4px 8px;
            border-radius: 4px;
            margin: 4px;
            font-size: 0.85rem;
        }
        .repo-section-title {
            font-size: 0.9rem;
            color: var(--accent);
            text-transform: uppercase;
            margin-top: 10px;
            margin-bottom: 5px;
            font-weight: 700;
        }

        /* --- Estilos Cola de Copiado --- */
        .context-selector {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            background: #0f172a;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #334155;
        }
        .context-selector label { margin: 0; font-size: 0.85rem; }
        .context-selector select { margin: 0; width: auto; flex-grow: 1; }

        .queue-container { margin-top: 25px; }
        .queue-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #0f172a;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 8px;
            border: 1px solid #334155;
            transition: border-color 0.3s;
        }
        .queue-item.copied { border-color: var(--green); opacity: 0.7; }
        .queue-item-info { font-size: 0.9rem; font-weight: 600; }
        .copy-part-btn { width: auto; padding: 8px 16px; font-size: 0.85rem; }
        .copy-part-btn.copied { background: var(--green); }
        .copy-all-btn { background: var(--green); width: 100%; margin-bottom: 15px; }
        .copy-all-btn:hover { background: #059669; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-area">
        <h1>🚀 GitHub Prompt Helper</h1>
        <p class="subtitle">Empaqueta tu código público directamente para la IA</p>
        <div class="version-container">
            <span class="version-badge">Index: v2.1.0</span>
            <span class="version-badge" id="versionApp">App: Cargando...</span>
        </div>
    </div>

    <div class="box">
        <div class="url-grid">
            <div>
                <label for="repoUrl">URL del Repositorio Principal (GitHub)</label>
                <input type="text" id="repoUrl" placeholder="Ej: https://github.com/usuario/proyecto_principal">
                <select id="repoHistorySelect" style="display: none; font-size: 0.85rem; margin-top: -5px;">
                    <option value="" disabled selected>📂 Historial de repositorios usados...</option>
                </select>
            </div>
            <div>
                <label for="repoUrlSecundario">URL del Repositorio Secundario (Opcional)</label>
                <input type="text" id="repoUrlSecundario" placeholder="Ej: https://github.com/usuario/proyecto_referencia">
            </div>
        </div>

        <div class="context-selector">
            <label>🧠 Tamaño de Contexto de tu IA:</label>
            <select id="limitSelect">
                <option value="100000">Gigante (Gemini 1.5 - 1 Sola Parte)</option>
                <option value="60000">Grande (Claude 3.5 - Pocas Partes)</option>
                <option value="30000">Mediano (GPT-4o Estándar)</option>
                <option value="15000" selected>Pequeño (Modelos Antiguos - 15k chars)</option>
            </select>
        </div>
        
        <label for="instrucciones">¿Qué le vas a pedir a la IA? (Escribe tu Prompt aquí)</label>
        <textarea id="instrucciones" placeholder="Ej: Analiza el proyecto secundario e implementa la lógica de botones dinámicos en el archivo app.js del proyecto principal..."></textarea>
        
        <div class="btn-group">
            <button id="btnGenerar" onclick="construirSuperPrompt()" style="flex: 2;">⚡ GENERAR PROMPTS</button>
            <button id="btnReset" onclick="limpiarInterfaz()" style="display: none; flex: 1;">🔄 NUEVA CONSULTA</button>
        </div>
        <div id="statusCarga" class="status"></div>
    </div>

    <div class="box" id="previewBox" style="display:none;">
        <label>Archivos detectados e incluidos en el contexto:</label>
        <div id="listaArchivos"></div>
        
        <div class="queue-container" id="queueContainer" style="display:none;">
            <hr style="border-color: #334155; margin: 20px 0;">
            <h3 style="margin-top:0; color:var(--accent);">📋 Cola de Copiado Rápido</h3>
            <p style="font-size: 0.85rem; color: #94a3b8; margin-top: -10px;">Haz clic en cada parte, pégala en tu IA, y vuelve por la siguiente.</p>
            <button class="copy-all-btn" id="btnCopiarTodo" onclick="copiarTodoElPrompt()" style="display:none;">📄 COPIAR TODO EN UNO (Solo para IAs con contexto largo)</button>
            <div id="partQueue"></div>
        </div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
