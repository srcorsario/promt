<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt & GitHub Context Sync</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --text: #f8fafc;
            --green: #10b981;
        }
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 96%; /* Aprovecha casi la totalidad de pantallas grandes */
            margin: 0 auto;
        }
        .header-area {
            text-align: center;
            margin-bottom: 25px;
            position: relative;
        }
        h1 { color: var(--accent); font-size: 2.2rem; margin-bottom: 5px; }
        p.subtitle { color: #94a3b8; margin-top: 0; margin-bottom: 10px; }
        .version-badge {
            display: inline-block;
            background: #334155;
            color: var(--accent);
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
        }
        
        .box {
            background: var(--card);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .url-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        @media (max-width: 768px) {
            .url-grid { grid-template-columns: 1fr; gap: 0; }
        }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: #cbd5e1; }
        input[type="text"], textarea {
            width: 100%;
            padding: 12px;
            box-sizing: border-box;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: white;
            font-family: inherit;
            margin-bottom: 15px;
        }
        /* Caja de prompt gigante aprovechando el ancho y alto del monitor */
        textarea { 
            height: 350px; 
            resize: vertical; 
            font-size: 1.05rem;
            line-height: 1.5;
        }
        
        button {
            width: 100%;
            background: var(--accent);
            color: #0f172a;
            border: none;
            padding: 16px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: #7dd3fc; }
        button:disabled { background: #475569; color: #94a3b8; cursor: not-allowed; }
        
        .status {
            text-align: center;
            font-weight: 600;
            margin: 15px 0 0;
            color: var(--green);
            display: none;
            font-size: 1.05rem;
        }
        .file-tag {
            display: inline-block;
            background: #334155;
            padding: 4px 8px;
            border-radius: 4px;
            margin: 4px;
            font-size: 0.85rem;
        }
        .repo-section-title {
            font-size: 0.9rem;
            color: var(--accent);
            text-transform: uppercase;
            margin-top: 10px;
            margin-bottom: 5px;
            font-weight: 700;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-area">
        <h1>🚀 GitHub Prompt Helper</h1>
        <p class="subtitle">Empaqueta tu código público directamente para la IA</p>
        <span class="version-badge">v1.2.0</span>
    </div>

    <div class="box">
        <div class="url-grid">
            <div>
                <label for="repoUrl">URL del Repositorio Principal (GitHub)</label>
                <input type="text" id="repoUrl" placeholder="Ej: https://github.com/usuario/proyecto_principal">
            </div>
            <div>
                <label for="repoUrlSecundario">URL del Repositorio Secundario (Opcional - Para clonar funciones)</label>
                <input type="text" id="repoUrlSecundario" placeholder="Ej: https://github.com/usuario/proyecto_referencia">
            </div>
        </div>
        
        <label for="instrucciones">¿Qué le vas a pedir a la IA? (Escribe tu Prompt aquí con total espacio)</label>
        <textarea id="instrucciones" placeholder="Ej: Analiza el proyecto secundario e implementa la lógica de botones dinámicos en el archivo app.js del proyecto principal..."></textarea>
        
        <button id="btnGenerar" onclick="construirSúperPrompt()">⚡ GENERAR Y COPIAR PROMPT</button>
        <div id="statusCarga" class="status"></div>
    </div>

    <div class="box" id="previewBox" style="display:none;">
        <label>Archivos detectados e incluidos en el contexto:</label>
        <div id="listaArchivos"></div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
